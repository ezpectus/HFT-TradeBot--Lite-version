server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/manifest+json text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # SPA routing — fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker & workbox MUST NOT be long-cached, otherwise PWA updates
    # never reach clients. Serve with revalidation instead.
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }
    location ~* ^/workbox-.*\.js$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Manifest should revalidate too (icons/paths may change between releases)
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Cache static assets (hashed filenames — safe to cache immutably)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
